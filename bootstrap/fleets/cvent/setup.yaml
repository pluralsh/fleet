apiVersion: deployments.plural.sh/v1alpha1
kind: ServiceDeployment
metadata:
  name: cvent
spec:
  
  namespace: cvent
  git:
    folder: fleets/cvent
    ref: main
  repositoryRef:
    kind: GitRepository
    name: fleet
    namespace: fleets
  clusterRef:
    kind: Cluster
    name: mgmt
    namespace: infra