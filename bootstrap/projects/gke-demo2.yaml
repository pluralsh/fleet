apiVersion: v1
kind: Namespace
metadata:
  name: gke-demo2
---
apiVersion: deployments.plural.sh/v1alpha1
kind: ServiceAccount
metadata:
  name: gke-demo2
spec:
  email: gke-demo2-sa@plural.sh
  tokenSecretRef:
    name: gke-demo2-sa-token
    namespace: gke-demo2
---
apiVersion: deployments.plural.sh/v1alpha1
kind: Project
metadata:
  name: gke-demo2
  # annotations:
  #   config.kubernetes.io/depends-on: deployments.plural.sh/ServiceAccount/gke-demo2
spec:
  name: gke-demo2
  description: Resources for managing the gke-demo2 fleet
  bindings:
    write:
    - userEmail: gke-demo2-sa@plural.sh
---
apiVersion: deployments.plural.sh/v1alpha1
kind: NamespaceCredentials
metadata:
  name: gke-demo2
spec:
  namespaces:
  - gke-demo2
  secretRef:
    name: gke-demo2-sa-token
    namespace: gke-demo2