apiVersion: v1
kind: Namespace
metadata:
  name: ta-fleet
---
apiVersion: deployments.plural.sh/v1alpha1
kind: ServiceAccount
metadata:
  name: ta-fleet
spec:
  email: ta-fleet-sa@plural.sh
  tokenSecretRef:
    name: ta-fleet-sa-token
    namespace: ta-fleet
---
apiVersion: deployments.plural.sh/v1alpha1
kind: Project
metadata:
  name: ta-fleet
  # annotations:
  #   config.kubernetes.io/depends-on: deployments.plural.sh/ServiceAccount/ta-fleet
spec:
  name: ta-fleet
  description: Resources for managing the ta-fleet fleet
  bindings:
    write:
    - userEmail: ta-fleet-sa@plural.sh
---
apiVersion: deployments.plural.sh/v1alpha1
kind: NamespaceCredentials
metadata:
  name: ta-fleet
spec:
  namespaces:
  - ta-fleet
  secretRef:
    name: ta-fleet-sa-token
    namespace: ta-fleet