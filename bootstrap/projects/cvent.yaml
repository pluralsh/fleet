apiVersion: v1
kind: Namespace
metadata:
  name: cvent
---
apiVersion: deployments.plural.sh/v1alpha1
kind: ServiceAccount
metadata:
  name: cvent
spec:
  email: cvent-sa@plural.sh
  tokenSecretRef:
    name: cvent-sa-token
    namespace: cvent
---
apiVersion: deployments.plural.sh/v1alpha1
kind: Project
metadata:
  name: cvent
  # annotations:
  #   config.kubernetes.io/depends-on: deployments.plural.sh/ServiceAccount/cvent
spec:
  name: cvent
  description: Resources for managing the cvent fleet
  bindings:
    write:
    - userEmail: cvent-sa@plural.sh
---
apiVersion: deployments.plural.sh/v1alpha1
kind: NamespaceCredentials
metadata:
  name: cvent
spec:
  namespaces:
  - cvent
  secretRef:
    name: cvent-sa-token
    namespace: cvent