apiVersion: v1
kind: Namespace
metadata:
  name: gle-demo
---
apiVersion: deployments.plural.sh/v1alpha1
kind: ServiceAccount
metadata:
  name: gle-demo
spec:
  email: gle-demo-sa@plural.sh
  tokenSecretRef:
    name: gle-demo-sa-token
    namespace: gle-demo
---
apiVersion: deployments.plural.sh/v1alpha1
kind: Project
metadata:
  name: gle-demo
  # annotations:
  #   config.kubernetes.io/depends-on: deployments.plural.sh/ServiceAccount/gle-demo
spec:
  name: gle-demo
  description: Resources for managing the gle-demo fleet
  bindings:
    write:
    - userEmail: gle-demo-sa@plural.sh
---
apiVersion: deployments.plural.sh/v1alpha1
kind: NamespaceCredentials
metadata:
  name: gle-demo
spec:
  namespaces:
  - gle-demo
  secretRef:
    name: gle-demo-sa-token
    namespace: gle-demo