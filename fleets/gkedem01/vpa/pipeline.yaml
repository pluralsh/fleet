apiVersion: deployments.plural.sh/v1alpha1
kind: Pipeline
metadata:
  name: gkedem01-vpa
spec:
  projectRef:
    name: gkedem01
  stages:
    - name: dev
      services:
        - serviceRef:
            name: vpa-dev
            namespace: gkedem01
          criteria:
            prAutomationRef:
              name: gkedem01-pra
    - name: prod
      services:
        - serviceRef:
            name: vpa-prod
            namespace: gkedem01
          criteria:
            prAutomationRef:
              name: gkedem01-pra
  edges:
    - from: dev
      to: prod
      gates:
      - name: approval-gate
        type: APPROVAL